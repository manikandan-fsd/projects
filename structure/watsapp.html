<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Chat Button</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f4f4f4;
      height:100vh;
    }

    /* WhatsApp Floating Button */
    .whatsapp-chat{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      width:60px;
      height:60px;
      border-radius:50%;
      text-align:center;
      line-height:60px;
      font-size:30px;
      text-decoration:none;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .whatsapp-chat:hover{
      background:#1ebe5d;
      transform:scale(1.1);
    }
  </style>
</head>
<body>

  <h1 style="text-align:center; margin-top:100px;">
    WhatsApp Chat Button Example
  </h1>

  <!-- WhatsApp Button -->
  <a 
    href="https://wa.me/919698548633"
    class="whatsapp-chat"
    target="_blank">
    💬
  </a>

</body>
</html>
