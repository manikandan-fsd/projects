<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Smart Contact Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#141e30,#243b55);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      padding:30px;
      border-radius:20px;
      box-shadow:0 8px 30px rgba(0,0,0,0.3);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      font-size:28px;
    }

    .ai-badge{
      text-align:center;
      margin-bottom:20px;
      color:#00ffd5;
      font-size:14px;
    }

    .input-group{
      margin-bottom:16px;
    }

    input, textarea{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      outline:none;
      background:rgba(255,255,255,0.12);
      color:white;
      font-size:15px;
    }

    input::placeholder,
    textarea::placeholder{
      color:#ddd;
    }

    textarea{
      resize:none;
      height:120px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#00ffd5;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      font-size:16px;
    }

    button:hover{
      transform:scale(1.02);
      background:#00d9b5;
    }

    button:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }

    .status{
      margin-top:15px;
      text-align:center;
      font-size:14px;
    }

    .success{
      color:#00ff95;
    }

    .error{
      color:#ff6b6b;
    }

    .ai-box{
      margin-top:15px;
      background:rgba(255,255,255,0.08);
      padding:12px;
      border-radius:12px;
      font-size:14px;
      line-height:1.6;
    }

    .typing{
      animation:blink 1s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0.5;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <h2>AI Contact Form</h2>

    <div class="ai-badge">
      Smart AI Analysis Enabled
    </div>

    <form id="contactForm">

      <div class="input-group">
        <input type="text" id="name" placeholder="Your Name" required>
      </div>

      <div class="input-group">
        <input type="email" id="email" placeholder="Your Email" required>
      </div>

      <div class="input-group">
        <textarea id="message" placeholder="Write your message..." required></textarea>
      </div>

      <button type="submit" id="submitBtn">
        Send with AI
      </button>

      <div class="status" id="status"></div>

      <div class="ai-box" id="aiResponse" style="display:none;"></div>

    </form>

  </div>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      push
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://vegeta-2bb6c-default-rtdb.firebaseio.com/",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById("contactForm");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");
    const aiResponse = document.getElementById("aiResponse");

    // AI Mood Detection
    function detectMood(message){

      const text = message.toLowerCase();

      if(text.includes("help") || text.includes("problem")){
        return "User may need urgent support.";
      }

      if(text.includes("love") || text.includes("great")){
        return "Positive feedback detected.";
      }

      if(text.includes("angry") || text.includes("bad")){
        return "Negative sentiment detected.";
      }

      return "Neutral message detected.";
    }

    // AI Smart Reply
    function generateAIReply(name, message){

      const mood = detectMood(message);

      return `
        Hello ${name},

        AI Analysis Complete.

        ${mood}

        Your message has been received successfully.
        Our smart system will process your request shortly.

        Thank you for contacting us.
      `;
    }

    // Form Submit
    form.addEventListener("submit", async (e) => {

      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      if(!name || !email || !message){
        showStatus("Please fill all fields.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "AI Processing...";

      aiResponse.style.display = "block";
      aiResponse.innerHTML = `
        <span class="typing">
          AI analyzing message...
        </span>
      `;

      try{

        // AI Analysis
        const mood = detectMood(message);
        const aiReply = generateAIReply(name, message);

        // Save to Firebase
        await push(ref(db, "ai_contacts"), {

          name,
          email,
          message,
          mood,
          aiReply,

          createdAt:new Date().toISOString()

        });

        // Show AI Result
        setTimeout(() => {

          aiResponse.innerHTML = aiReply;

        }, 1500);

        showStatus("AI Message Saved Successfully!", "success");

        form.reset();

      }
      catch(error){

        console.error(error);

        showStatus("Failed to save data.", "error");

      }

      submitBtn.disabled = false;
      submitBtn.innerText = "Send with AI";

    });

    function showStatus(text, type){

      status.innerText = text;
      status.className = `status ${type}`;

      setTimeout(() => {
        status.innerText = "";
      }, 4000);

    }

  </script>

</body>
</html>
